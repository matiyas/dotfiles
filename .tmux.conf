### Basic Settings ###
set -g status-interval 1
setw -g mode-keys vi
set -g mouse on
set -g default-command /bin/zsh
set -g allow-passthrough on
set -g set-clipboard on

### Clipboard Integration ###
if-shell "uname | grep -q Darwin" \
  "bind C-p run 'tmux set-buffer \"$(pbpaste)\"; tmux paste-buffer'; \
   bind C-y run 'tmux save-buffer - | pbcopy'; \
   bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel 'pbcopy'; \
   bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel 'pbcopy'; \
   bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel 'pbcopy'"
if-shell "uname | grep -q Linux" \
  "bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'wl-copy'; \
   bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'wl-copy'; \
   bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'wl-copy'"

### Window Navigation ###
bind -n C-h previous-window
bind -n C-l next-window

# Pane borders
set -g pane-border-style fg=#565f89
set -g pane-active-border-style fg=#7aa2f7

# Status bar
set -g status-style bg=#16161e,fg=#565f89
set -g status-left-length 40
set -g status-right-length 200
set -g status-left "#[fg=#16161e,bg=#7aa2f7,bold] #S #[fg=#7aa2f7,bg=#16161e] "
set -g status-right '#[fg=#a9b1d6]CPU:#(vmstat 1 2 | tail -1 | awk '"'"'{printf "%d", 100-$15}'"'"')% | RAM:#(free | awk '"'"'NR==2 {printf "%.0f", $3/$2*100}'"'"')% (#(free -h | awk '"'"'NR==2 {print $3"/"$2}'"'"')) | VOL:#(V=$(wpctl get-volume @DEFAULT_AUDIO_SINK@ 2>/dev/null | awk "{print int(\$2*100)}"); [ -n "$V" ] && echo "$V%" || echo "N/A") | WIFI:#(awk '"'"'NR==3 {gsub(/\./,"",$3); printf "%d", $3+0}'"'"' /proc/net/wireless 2>/dev/null || echo "N/A")% | IP:#(hostname -I | cut -d" " -f1) | BAT:#(cat /sys/class/power_supply/axp20x-battery/capacity 2>/dev/null || cat /sys/class/power_supply/BAT*/capacity 2>/dev/null || echo "N/A" | awk '"'"'{printf "%d", $1+0}'"'"')% | #[fg=#7aa2f7]%H:%M:%S '

# Window tabs
set -g window-status-format "#[fg=#848db5,bg=#16161e] #I:#W "
set -g window-status-current-format "#[fg=#c0caf5,bg=#283457,bold] #I:#W "
set -g window-status-separator ""

# Message & command prompt
set -g message-style fg=#c0caf5,bg=#1a1b26
set -g message-command-style fg=#c0caf5,bg=#1a1b26

# Copy mode highlight
setw -g mode-style fg=#c0caf5,bg=#283457

# Clock
setw -g clock-mode-colour "#7aa2f7"
